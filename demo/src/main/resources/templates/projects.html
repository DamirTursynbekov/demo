<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Проекты</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Student Project</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link text-white" href="/">Главная</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/about">О нас</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/projects">Проекты</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/services">Услуги</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/contacts">Контакты</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4 text-center">Список выполненных работ</h2>
    <div class="row">
        <div class="col-md-4" th:each="project : ${projectsList}">
            <div class="card mb-4 shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${project.name}">Project Name</h5>
                    <h6 class="card-subtitle mb-2 text-muted" th:text="${project.year} + ' год'">2024</h6>
                    <p class="card-text" th:text="${project.desc}">Описание...</p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
