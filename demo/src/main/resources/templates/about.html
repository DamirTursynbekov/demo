<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>О нас</title>
    <style>
        /* Общие стили страницы */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; /* Светло-серый фон */
            text-align: center;
            padding: 30px;
            margin: 0;
        }

        /* Кнопка "На главную" */
        .back-link {
            display: inline-block;
            text-decoration: none;
            color: #555;
            background: white;
            padding: 10px 20px;
            border-radius: 30px; /* Овальная кнопка */
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: background 0.3s;
            margin-bottom: 40px;
        }
        .back-link:hover { background: #e4e6eb; }

        /* ЗАГОЛОВОК */
        h1 {
            color: #1c1e21;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #65676b;
            font-size: 1.2em;
            margin-bottom: 40px;
        }

        /* СТИЛЬ ДЛЯ ОБЩЕГО ФОТО */
        .team-photo-container {
            /* Контейнер нужен для правильного центрирования и эффектов */
            max-width: 800px;   /* Максимальная ширина фото */
            margin: 0 auto;     /* Центрирование по горизонтали */
            padding: 10px;
            background: white;
            border-radius: 25px; /* Сильное закругление углов рамки */
            box-shadow: 0 20px 40px rgba(0,0,0,0.15); /* Большая мягкая тень */
        }

        .team-photo {
            width: 100%;        /* Фото растягивается на всю ширину контейнера */
            height: auto;       /* Высота подстраивается автоматически */
            border-radius: 20px; /* Закругление самого фото чуть меньше рамки */
            display: block;
        }

        /* ОПИСАНИЕ ПОД ФОТО */
        .description-box {
            max-width: 700px;
            margin: 40px auto 0;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .names {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .roles {
            font-size: 1.1em;
            color: #007bff; /* Синий цвет для ролей */
            font-weight: bold;
        }
    </style>
</head>
<body>

<a href="/" class="back-link">⬅ На главную</a>

<h1>Наша Команда</h1>
<p class="subtitle">Два разработчика</p>

<div class="team-photo-container">
    <img src="/images/we.jpg" alt="Мы вместе" class="team-photo">
</div>

<div class="description-box">
    <p class="names">Дамир & Нұрсұлтан</p>
    <p class="roles">Backend (Java) + Frontend</p>
    <p>Мы создали этот сайт с нуля, чтобы прокачать свои навыки и сделать что-то крутое.</p>
</div>

</body>
</html>
